name: Keep Render Server Alive

on:
  schedule:
    - cron: '*/9 * * * *' # Runs every 7 minutes
  workflow_dispatch: # Allows you to run it manually from the GitHub Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health endpoint
        # Replace the URL with your actual deployed Render URL
        run: curl -sSf https://wubble-hackathon-vibey-1.onrender.com/api/health/ > /dev/null